<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta
      http-equiv="X-UA-Compatible"
      content="ie=edge"
    />
    <title>Moyo header</title>

    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />

    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@500&display=swap"
    />

    <link
      rel="stylesheet"
      href="./style.css"
    />
  </head>
  <body>
    <h1>Moyo header</h1>

    <header class="header">
      <div class="container">
        <a
          href="#"
          class="logo-link"
        >
          <img
            src="images/logo.png"
            alt="logo.png"
            class="logo"
          />
        </a>
      </div>
    </header>

    <nav class="nav">
      <ul class="nav__list">
        <li class="nav__item">
          <a
            href="#"
            class="nav__link is-active"
          >
            Головна
          </a>
        </li>
        <li class="nav__item">
          <a
            href="#"
            class="nav__link"
          >
            Смартфони
          </a>
        </li>
        <li class="nav__item">
          <a
            href="#"
            class="nav__link"
          >
            Планшети
          </a>
        </li>
        <li class="nav__item">
          <a
            href="#"
            class="nav__link"
            data-qa="hover"
          >
            Ноутбуки та комп'ютери
          </a>
        </li>
      </ul>
    </nav>
  </body>
</html>
